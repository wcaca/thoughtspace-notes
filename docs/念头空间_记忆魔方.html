<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>念头空间 · 记忆魔方</title>
<style>
  :root{
    --bg-deep:#0a0d1c;
    --bg-panel:#141a33;
    --line:#2a3358;
    --crystal:#7fe0c9;
    --amber:#e8a865;
    --ink:#e9e7f4;
    --ink-dim:#8b90ad;
    --face-w: 300px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%;
    background:
      radial-gradient(ellipse at 20% 20%, #131a36 0%, transparent 55%),
      radial-gradient(ellipse at 80% 75%, #1a1440 0%, transparent 55%),
      var(--bg-deep);
    color:var(--ink);
    font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    overflow:hidden;
  }
  .stars{ position:fixed; inset:0; z-index:0; }
  .stars span{
    position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
    opacity:.5; animation:tw 4s ease-in-out infinite;
  }
  @keyframes tw{ 0%,100%{opacity:.15} 50%{opacity:.8} }

  header{
    position:relative; z-index:2; text-align:center; padding:28px 20px 6px;
  }
  header h1{
    font-family:"Songti SC","STSong",serif;
    font-size:26px; letter-spacing:6px; margin:0; font-weight:600;
    color:var(--ink);
  }
  header p{
    margin:8px 0 0; font-size:13px; color:var(--ink-dim); letter-spacing:2px;
  }

  .stage{
    position:relative; z-index:1;
    width:100%; height:calc(100vh - 210px);
    display:flex; align-items:center; justify-content:center;
    perspective:1400px;
  }
  .cube-wrap{
    width:var(--face-w); height:var(--face-w);
    position:relative;
    transform-style:preserve-3d;
    transform: rotateX(-22deg) rotateY(35deg);
    transition: transform .15s ease-out;
    cursor:grab;
  }
  .cube-wrap.dragging{ cursor:grabbing; transition:none; }

  .face{
    position:absolute; width:var(--face-w); height:var(--face-w);
    background: linear-gradient(160deg, var(--bg-panel), #0e1330 85%);
    border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:18px; text-align:center;
    box-shadow: inset 0 0 40px rgba(127,224,201,.05);
    transition: box-shadow .3s, border-color .3s, background .3s;
  }
  .face:hover{
    border-color: var(--crystal);
    box-shadow: inset 0 0 60px rgba(127,224,201,.15), 0 0 30px rgba(127,224,201,.12);
  }
  .face .room-no{
    font-size:11px; letter-spacing:3px; color:var(--amber); margin-bottom:10px;
  }
  .face .room-name{
    font-family:"Songti SC","STSong",serif;
    font-size:24px; font-weight:600; margin:0 0 14px;
  }
  .face .room-parts{
    font-size:12px; color:var(--ink-dim); line-height:1.9;
  }
  .face .room-parts b{ color:var(--crystal); font-weight:500; }

  .f-front { transform: translateZ(calc(var(--face-w)/2)); }
  .f-back  { transform: rotateY(180deg) translateZ(calc(var(--face-w)/2)); }
  .f-right { transform: rotateY(90deg) translateZ(calc(var(--face-w)/2)); }
  .f-left  { transform: rotateY(-90deg) translateZ(calc(var(--face-w)/2)); }
  .f-top   { transform: rotateX(90deg) translateZ(calc(var(--face-w)/2)); }
  .f-bottom{ transform: rotateX(-90deg) translateZ(calc(var(--face-w)/2)); }

  .hint{
    position:relative; z-index:2; text-align:center; color:var(--ink-dim);
    font-size:12px; letter-spacing:1px; padding-bottom:6px;
  }
  .controls{
    position:relative; z-index:2; display:flex; justify-content:center; gap:10px;
    padding-bottom:26px; flex-wrap:wrap;
  }
  .controls button{
    background:transparent; border:1px solid var(--line); color:var(--ink-dim);
    padding:7px 16px; border-radius:20px; font-size:12px; cursor:pointer;
    letter-spacing:1px; transition:.2s;
  }
  .controls button:hover{ border-color:var(--crystal); color:var(--crystal); }
  .controls button.active{ border-color:var(--amber); color:var(--amber); }

  /* 详情面板 */
  .overlay{
    position:fixed; inset:0; z-index:10;
    background:rgba(6,8,20,.88); backdrop-filter: blur(6px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .35s ease;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }
  .panel{
    width:min(760px, 92vw); max-height:82vh; overflow-y:auto;
    background: linear-gradient(160deg, #171d3d, #0d1128);
    border:1px solid var(--line); border-radius:6px;
    padding:34px 38px 30px;
    transform: translateY(16px) scale(.98); transition: transform .35s ease;
  }
  .overlay.open .panel{ transform:translateY(0) scale(1); }
  .panel-eyebrow{ font-size:12px; letter-spacing:4px; color:var(--amber); }
  .panel h2{
    font-family:"Songti SC","STSong",serif; font-size:28px; margin:8px 0 22px;
    border-bottom:1px solid var(--line); padding-bottom:16px;
  }
  .station{ margin-bottom:26px; padding-bottom:22px; border-bottom:1px dashed var(--line); }
  .station:last-child{ border-bottom:none; margin-bottom:0; }
  .station .tag{
    display:inline-block; font-size:11px; color:var(--bg-deep); background:var(--crystal);
    padding:2px 9px; border-radius:10px; letter-spacing:1px; margin-bottom:10px;
  }
  .station h3{ margin:0 0 4px; font-size:18px; font-weight:600; }
  .station .anchor{
    font-size:13px; color:var(--amber); margin:0 0 12px; font-style:normal;
  }
  .station ul{ margin:0; padding-left:20px; color:var(--ink-dim); font-size:13px; line-height:1.85; }
  .station ul li b{ color:var(--ink); font-weight:500; }
  .close-btn{
    position:absolute; top:18px; right:24px; background:none; border:none;
    color:var(--ink-dim); font-size:22px; cursor:pointer; line-height:1;
  }
  .close-btn:hover{ color:var(--crystal); }
  .panel{ position:relative; }

  @media (max-width:600px){
    :root{ --face-w:220px; }
    header h1{ font-size:20px; letter-spacing:3px; }
    .panel{ padding:26px 20px 24px; }
    .panel h2{ font-size:22px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <h1>念 头 空 间 · 记 忆 魔 方</h1>
  <p>拖动旋转 · 点击一面进入房间 · 十二份规划，六间房</p>
</header>

<div class="stage">
  <div class="cube-wrap" id="cube">
    <div class="face f-front"  data-room="0"></div>
    <div class="face f-right"  data-room="1"></div>
    <div class="face f-back"   data-room="2"></div>
    <div class="face f-left"   data-room="3"></div>
    <div class="face f-top"    data-room="4"></div>
    <div class="face f-bottom" data-room="5"></div>
  </div>
</div>

<div class="hint">用鼠标/手指拖动魔方，或点击下方按钮定位到某一间房</div>
<div class="controls" id="jumpBtns"></div>

<div class="overlay" id="overlay">
  <div class="panel" id="panel"></div>
</div>

<script>
const rooms = [
  {
    face:'front', name:'地基之室', roman:'ROOM I · 产品志',
    stations:[
      {tag:'Part 1', title:'产品功能规划', anchor:'记忆锚点：一位蹲在田里的念头园丁',
       points:[
         '<b>核心链条</b>：笔记 → 念头 → 结构 → 结晶 → 行动，同一份数据的不同折叠态',
         '<b>念头的物理属性</b>：质量、温度（新鲜度）、张力、聚合体积，让念头像活物',
         '<b>克制游戏化</b>：用有机隐喻（生态/结晶）而非等级积分，拒绝数值攀比'
       ]},
      {tag:'Part 2', title:'几何结构系统', anchor:'记忆锚点：一串挂着十二种钥匙的钥匙环',
       points:[
         '<b>形状即语义</b>：星团/树/时间线/矩阵/光谱/曼陀罗/螺旋/网/同心圆/分形/管道…每种结构=一种思维方式',
         '<b>ThoughtLensCoordinate</b>：同一念头在不同结构下各有一套坐标，互不冲突',
         '<b>渐进解锁</b>：新用户只见3种，其余随使用深度逐步开放'
       ]}
    ]
  },
  {
    face:'right', name:'骨架之室', roman:'ROOM II · 技术志',
    stations:[
      {tag:'Part 3', title:'技术架构与工程规划', anchor:'记忆锚点：一副藏在皮肤下的钢筋骨架',
       points:[
         '<b>分层铁律</b>：core-domain/geometry-engines 绝不依赖渲染库，三端复用',
         '<b>Yjs是权威源，SQLite是可重建索引</b>，两套存储各司其职',
         '<b>IGeometryEngine统一接口</b>：12种几何算法可插拔、可测试'
       ]},
      {tag:'Part 8', title:'颗粒度补全与全局审查', anchor:'记忆锚点：拿放大镜逐行核对的质检员',
       points:[
         '<b>补齐量化公式</b>：温度衰减公式、结晶cohesion_score计算方法',
         '<b>合理留白清单</b>：色板/参数校准值/License条款——该留给实践，不该现在编数字',
         '<b>License兼容性检查</b>：Qwen/DeepSeek模型权重需逐版本核实条款'
       ]}
    ]
  },
  {
    face:'back', name:'血脉之室', roman:'ROOM III · 自主志',
    stations:[
      {tag:'Part 4', title:'自主开发模式（开源模型版）', anchor:'记忆锚点：一台永不睡觉却会自我检查的学徒',
       points:[
         '<b>Reason→Act→Verify闭环</b>：Planner/Coder/Verifier/Committer子agent接力',
         '<b>测试驱动补偿</b>：开源模型能力波动，靠严格验证兜底，不能既当运动员又当裁判',
         '<b>人工仅两类介入</b>：Phase边界checkpoint + 连续失败后的异常升级'
       ]},
      {tag:'Part 11', title:'完整自主推进到完成', anchor:'记忆锚点：被信任放权、自己排期的项目经理',
       points:[
         '<b>三层DoD</b>：Task级/Phase级/项目级，让"完成"可被自主判断',
         '<b>Self-Specification</b>：规格空白处依据宪法自主起草+标记+继续，不阻塞',
         '<b>永不自主化的三件事</b>：发不发布、隐私安全代码、架构性决策'
       ]}
    ]
  },
  {
    face:'left', name:'记忆之室', roman:'ROOM IV · 知识志',
    stations:[
      {tag:'Part 5', title:'知识库架构与采集配置', anchor:'记忆锚点：一座会自己呼吸、按需换气的图书馆',
       points:[
         '<b>内部KB优先于外部KB</b>：authority_level字段裁决冲突',
         '<b>代码即知识库</b>：git commit即触发KB-2实时重新索引',
         '<b>按agent角色路由检索</b>：Planner/Coder/Verifier各查各的，不做全库检索'
       ]},
      {tag:'Part 6', title:'知识库预置与顿悟机制', anchor:'记忆锚点：开课前把讲义背得滚瓜烂熟的老教授',
       points:[
         '<b>预置优于被动检索</b>：项目宪法、多粒度摘要、反模式清单提前写好',
         '<b>跨领域知识注入</b>：结晶学/生态学真实原理，而非停留在隐喻表面',
         '<b>理解力自检</b>：让agent复述"做了什么/为什么"，暴露理解盲区'
       ]}
    ]
  },
  {
    face:'top', name:'顿悟之室', roman:'ROOM V · 精进志',
    stations:[
      {tag:'Part 7', title:'顿悟触达广度与理解力深度', anchor:'记忆锚点：一个把万物都拿来类比的哲学家',
       points:[
         '<b>洞察账本+传播扫描</b>：一处顿悟，主动检查是否适用别处',
         '<b>因果链显式化</b>：不满足"是什么"，必须回答"为什么不是另一种设计"',
         '<b>警惕伪顿悟</b>：未验证的洞察标记pending，不可当既定事实使用'
       ]},
      {tag:'Part 10', title:'Agent人设与GEB文档协议适配', anchor:'记忆锚点：一位同时看得懂两个工地图纸的翻译官',
       points:[
         '<b>CLAUDE.md是唯一权威源</b>：Trae/Claude Code等工具各自做"指针适配"，不复制内容',
         '<b>L1/L2/L3同构代码与文档</b>：改代码后必须回环检查三层文档',
         '<b>协议价值=Verifier是否真检查</b>：贴在配置里不检查，等于摆设'
       ]}
    ]
  },
  {
    face:'bottom', name:'时间之室', roman:'ROOM VI · 长青志',
    stations:[
      {tag:'Part 9', title:'阅读执行指导与异常应对手册', anchor:'记忆锚点：贴在墙上的急救流程图',
       points:[
         '<b>阅读顺序 ≠ 生成顺序</b>：先读Part1建心智模型，Part8留白清单提前预防误读',
         '<b>紧急制动</b>：任何人可一键暂停，必须人工显式确认才能恢复',
         '<b>事故档案</b>：手册的价值来自真实案例的持续填充，而非预案本身'
       ]},
      {tag:'Part 12', title:'长期知识演化与熵增对抗', anchor:'记忆锚点：打理了四十年花园却从不觉得杂乱的老园丁',
       points:[
         '<b>温度×成熟度双维度</b>：区分"该清理"和"冷但珍贵，别动它"',
         '<b>索引结构（非新几何）</b>：给已有Structure一个"导航地图"角色标记',
         '<b>季度体检用叙述不用分数</b>："长出37颗新芽"而非"健康度78分"'
       ]}
    ]
  }
];

// 生成星空背景
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('span');
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=(Math.random()*4)+'s';
  starsEl.appendChild(s);
}

// 填充六个面
const faceEls = document.querySelectorAll('.face');
const faceOrder = ['front','right','back','left','top','bottom'];
faceEls.forEach(el=>{
  const idx = parseInt(el.dataset.room,10);
  const r = rooms[idx];
  el.innerHTML = `
    <div class="room-no">${r.roman}</div>
    <div class="room-name">${r.name}</div>
    <div class="room-parts">
      ${r.stations.map(s=>`<b>${s.tag}</b> ${s.title}`).join('<br>')}
    </div>
  `;
  el.addEventListener('click', ()=>openRoom(idx));
});

// 跳转按钮
const jumpWrap = document.getElementById('jumpBtns');
const targetRot = {
  front:  {x:-22, y:35},
  right:  {x:-22, y:-55},
  back:   {x:-22, y:215},
  left:   {x:-22, y:125},
  top:    {x:-95, y:35},
  bottom: {x:70,  y:35}
};
rooms.forEach((r,i)=>{
  const b=document.createElement('button');
  b.textContent = r.name;
  b.addEventListener('click', ()=>{
    rotateTo(faceOrder[i]);
    document.querySelectorAll('.controls button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
  });
  jumpWrap.appendChild(b);
});

let curX=-22, curY=35;
const cube = document.getElementById('cube');
function applyRot(){ cube.style.transform = `rotateX(${curX}deg) rotateY(${curY}deg)`; }
function rotateTo(face){
  const t = targetRot[face];
  curX = t.x; curY = t.y;
  applyRot();
}
applyRot();

// 拖拽旋转
let dragging=false, lastX=0, lastY=0;
cube.addEventListener('mousedown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; cube.classList.add('dragging'); });
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  curY += (e.clientX-lastX)*0.4;
  curX -= (e.clientY-lastY)*0.4;
  lastX=e.clientX; lastY=e.clientY;
  applyRot();
});
window.addEventListener('mouseup', ()=>{ dragging=false; cube.classList.remove('dragging'); });
// 触屏
cube.addEventListener('touchstart', e=>{ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchmove', e=>{
  if(!dragging) return;
  const t=e.touches[0];
  curY += (t.clientX-lastX)*0.4;
  curX -= (t.clientY-lastY)*0.4;
  lastX=t.clientX; lastY=t.clientY;
  applyRot();
}, {passive:true});
window.addEventListener('touchend', ()=>{ dragging=false; });

// 详情面板
const overlay = document.getElementById('overlay');
const panel = document.getElementById('panel');
function openRoom(idx){
  const r = rooms[idx];
  panel.innerHTML = `
    <button class="close-btn" id="closeBtn">&times;</button>
    <div class="panel-eyebrow">${r.roman}</div>
    <h2>${r.name}</h2>
    ${r.stations.map(s=>`
      <div class="station">
        <span class="tag">${s.tag}</span>
        <h3>${s.title}</h3>
        <p class="anchor">${s.anchor}</p>
        <ul>${s.points.map(p=>`<li>${p}</li>`).join('')}</ul>
      </div>
    `).join('')}
  `;
  overlay.classList.add('open');
  document.getElementById('closeBtn').addEventListener('click', closeRoom);
}
function closeRoom(){ overlay.classList.remove('open'); }
overlay.addEventListener('click', e=>{ if(e.target===overlay) closeRoom(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeRoom(); });
</script>
</body>
</html>
