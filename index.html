<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>念头空间 · Phase 0 游戏感交互原型</title>
<style>
  :root {
    --bg-deep: #0a0d1c;
    --bg-panel: #141a33;
    --line: #2a3358;
    --crystal: #7fe0c9;
    --amber: #e8a865;
    --rose: #e87aa8;
    --ink: #e9e7f4;
    --ink-dim: #8b90ad;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(ellipse at 20% 20%, #131a36 0%, transparent 55%),
                radial-gradient(ellipse at 80% 75%, #1a1440 0%, transparent 55%),
                var(--bg-deep);
    color: var(--ink);
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    overflow: hidden;
    user-select: none;
  }
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 18px 28px 12px;
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(180deg, rgba(10,13,28,0.85) 0%, rgba(10,13,28,0) 100%);
    pointer-events: none;
  }
  header h1 {
    margin: 0; font-family: "Songti SC", "STSong", serif;
    font-size: 20px; font-weight: 600; letter-spacing: 4px;
    pointer-events: auto;
  }
  header h1 small {
    display: block; font-family: inherit; font-size: 11px;
    color: var(--ink-dim); letter-spacing: 2px; margin-top: 4px; font-weight: 400;
  }
  .stats {
    font-size: 12px; color: var(--ink-dim); letter-spacing: 1px;
    pointer-events: auto;
    display: flex; gap: 18px;
  }
  .stats b { color: var(--crystal); font-weight: 500; }
  .toolbar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 10px;
    background: rgba(20,26,51,0.7); backdrop-filter: blur(10px);
    padding: 10px 16px; border-radius: 30px; border: 1px solid var(--line);
  }
  .toolbar button {
    background: transparent; border: 1px solid var(--line); color: var(--ink-dim);
    padding: 8px 16px; border-radius: 18px; font-size: 12px; cursor: pointer;
    letter-spacing: 1px; transition: all 0.2s;
    font-family: inherit;
  }
  .toolbar button:hover { border-color: var(--crystal); color: var(--crystal); }
  .toolbar button.primary { border-color: var(--amber); color: var(--amber); }
  .toolbar button.primary:hover { background: rgba(232,168,101,0.1); }
  .hint {
    position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%);
    z-index: 9; font-size: 11px; color: var(--ink-dim); letter-spacing: 2px;
    pointer-events: none; text-align: center;
    transition: opacity 0.6s;
  }
  .hint.fade { opacity: 0; }
  #stage { position: absolute; inset: 0; }
  .toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 20; padding: 16px 28px;
    background: rgba(127,224,201,0.12); border: 1px solid var(--crystal);
    border-radius: 12px; color: var(--crystal); font-size: 13px;
    letter-spacing: 2px; backdrop-filter: blur(8px);
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <h1>
      念头空间
      <small>PHASE 0 · 游戏感交互原型</small>
    </h1>
    <div class="stats">
      <span>念头 <b id="stat-thoughts">0</b></span>
      <span>连接 <b id="stat-edges">0</b></span>
      <span>FPS <b id="stat-fps">0</b></span>
    </div>
  </header>
  <div id="stage"></div>
  <div class="hint" id="hint">
    单击空白处投下一颗念头 · 拖动念头聚集 · Shift+点击两个念头建立连接 · 双击念头删除
  </div>
  <div class="toolbar">
    <button id="btn-add">+ 投下念头</button>
    <button id="btn-reset">重置布局</button>
    <button id="btn-sample">载入示例</button>
    <button id="btn-clear" class="primary">清空</button>
  </div>
  <div class="toast" id="toast">已自动持久化 ✓</div>

<script type="module">
/**
 * [INPUT]: 浏览器 DOM、用户鼠标/触摸事件、IndexedDB 持久化(Yjs+y-indexeddb)
 * [OUTPUT]: PixiJS 画布上呈现念头节点、连接线、温度发光、吸附提示、结晶动画
 * [POS]: thoughtspace-notes 的 Phase 0 入口,验证核心交互手感
 * [PROTOCOL]: 变更时更新此头部,然后检查 ../CLAUDE.md
 */
import * as PIXI from 'https://cdn.jsdelivr.net/npm/pixi.js@7.4.0/dist/pixi.min.mjs';
import * as d3 from 'https://cdn.jsdelivr.net/npm/d3-force@3.0.0/+esm';
import * as Y from 'https://cdn.jsdelivr.net/npm/yjs@13.6.18/+esm';
import { IndexeddbPersistence } from 'https://cdn.jsdelivr.net/npm/y-indexeddb@9.0.12/+esm';

// ---------- 1. Yjs 数据层(权威源) ----------
const ydoc = new Y.Doc();
const yThoughts = ydoc.getMap('thoughts');   // id -> { id, text, x, y, mass, temperature, colorTag, createdAt }
const yEdges    = ydoc.getMap('edges');      // id -> { id, fromId, toId, relationType }

const persistence = new IndexeddbPersistence('thoughtspace-notes-phase0', ydoc);

await new Promise(res => persistence.once('synced', res));

// ---------- 2. 渲染层(PixiJS) ----------
const stageEl = document.getElementById('stage');
const app = new PIXI.Application({ resizeTo: stageEl, backgroundAlpha: 0, antialias: true });
stageEl.appendChild(app.view);

const world = new PIXI.Container();
app.stage.addChild(world);

// 背景星尘(让画布有"呼吸感")
const dust = new PIXI.Graphics();
world.addChild(dust);
function redrawDust() {
  dust.clear();
  for (let i = 0; i < 220; i++) {
    const x = Math.random() * 4000 - 2000;
    const y = Math.random() * 4000 - 2000;
    const a = Math.random() * 0.25 + 0.05;
    dust.beginFill(0xffffff, a);
    dust.drawCircle(x, y, 1);
  }
}
redrawDust();

// 视图拖拽
let isPanning = false; let panStart = { x: 0, y: 0 };
app.stage.eventMode = 'static'; app.stage.cursor = 'grab';
app.stage.on('pointerdown', e => {
  if (e.target === app.stage) { isPanning = true; panStart = { x: e.global.x, y: e.global.y }; app.stage.cursor = 'grabbing'; }
});
app.stage.on('pointermove', e => {
  if (isPanning) { world.x += e.global.x - panStart.x; world.y += e.global.y - panStart.y; panStart = { x: e.global.x, y: e.global.y }; }
});
app.stage.on('pointerup', () => { isPanning = false; app.stage.cursor = 'grab'; });
app.stage.on('pointerupoutside', () => { isPanning = false; app.stage.cursor = 'grab'; });

// 缩放
app.view.addEventListener('wheel', e => {
  e.preventDefault();
  const scaleBy = 1.08;
  const oldScale = world.scale.x;
  const newScale = e.deltaY < 0 ? oldScale * scaleBy : oldScale / scaleBy;
  const px = e.offsetX, py = e.offsetY;
  world.scale.set(newScale);
  world.x = px - (px - world.x) * (newScale / oldScale);
  world.y = py - (py - world.y) * (newScale / oldScale);
}, { passive: false });

// ---------- 3. 力导向仿真(与渲染解耦,可独立测试) ----------
const simNodes = []; // { id, x, y, vx, vy, fx, fy, ref }
const simEdges = [];
const idToSim = new Map();

function rebuildSimFromYjs() {
  simNodes.length = 0; simEdges.length = 0; idToSim.clear();
  for (const t of yThoughts.values()) {
    const node = { id: t.id, x: t.x ?? (Math.random() - 0.5) * 600, y: t.y ?? (Math.random() - 0.5) * 400, vx: 0, vy: 0, ref: t };
    simNodes.push(node); idToSim.set(t.id, node);
  }
  for (const e of yEdges.values()) {
    if (idToSim.has(e.fromId) && idToSim.has(e.toId)) simEdges.push({ source: idToSim.get(e.fromId), target: idToSim.get(e.toId) });
  }
}

const sim = d3.forceSimulation(simNodes)
  .force('charge', d3.forceManyBody().strength(-180))
  .force('link', d3.forceLink(simEdges).id(d => d.id).distance(120).strength(0.4))
  .force('center', d3.forceCenter(0, 0))
  .force('collide', d3.forceCollide(34))
  .alphaDecay(0.02)
  .on('tick', () => {
    // 每个 tick 把仿真结果写回 Yjs(节流,避免每帧写入风暴)
    if (sim.alpha() < 0.05) return;
    ydoc.transact(() => {
      for (const n of simNodes) {
        const t = yThoughts.get(n.id);
        if (t && (t.x !== n.x || t.y !== n.y)) yThoughts.set(n.id, { ...t, x: n.x, y: n.y });
      }
    }, 'sim');
  });

// ---------- 4. 节点精灵层 ----------
const nodeLayer = new PIXI.Container();
const edgeLayer = new PIXI.Container();
world.addChild(edgeLayer); world.addChild(nodeLayer);

const spriteById = new Map();

function makeNodeSprite(t) {
  const g = new PIXI.Graphics();
  g.eventMode = 'static'; g.cursor = 'grab';
  const radius = 14 + Math.sqrt(t.mass ?? 1) * 4;
  const temp = t.temperature ?? 1;

  // 温度发光:外圈
  const glowAlpha = 0.18 + temp * 0.55;
  g.beginFill(0x7fe0c9, glowAlpha);
  g.drawCircle(0, 0, radius + 12);
  g.endFill();
  // 主体
  g.beginFill(0x141a33);
  g.lineStyle(1.5, 0x7fe0c9, 0.9);
  g.drawCircle(0, 0, radius);
  g.endFill();
  // 文字
  const label = new PIXI.Text(t.text.slice(0, 6), { fontFamily: 'PingFang SC, Microsoft YaHei, sans-serif', fontSize: 11, fill: 0xe9e7f4 });
  label.anchor.set(0.5); label.y = radius + 12;
  g.addChild(label);
  g.position.set(t.x ?? 0, t.y ?? 0);

  // 拖拽
  g.on('pointerdown', e => {
    e.stopPropagation();
    g.cursor = 'grabbing';
    const start = { x: e.global.x, y: e.global.y };
    const orig = { x: g.position.x, y: g.position.y };
    const onMove = ev => {
      const dx = ev.global.x - start.x; const dy = ev.global.y - start.y;
      g.position.set(orig.x + dx, orig.y + dy);
      const n = idToSim.get(t.id); if (n) { n.fx = g.position.x; n.fy = g.position.y; n.x = g.position.x; n.y = g.position.y; }
      sim.alphaTarget(0.3).restart();
    };
    const onUp = () => {
      g.cursor = 'grab';
      app.stage.off('pointermove', onMove); app.stage.off('pointerup', onUp); app.stage.off('pointerupoutside', onUp);
      const n = idToSim.get(t.id); if (n) { n.fx = null; n.fy = null; }
      // 写回 Yjs
      ydoc.transact(() => { yThoughts.set(t.id, { ...t, x: g.position.x, y: g.position.y }); }, 'user');
      showToast('已自动持久化 ✓');
    };
    app.stage.on('pointermove', onMove);
    app.stage.on('pointerup', onUp); app.stage.on('pointerupoutside', onUp);
  });

  // 双击删除
  g.on('pointertap', e => {
    if (e.shiftKey) return; // Shift 由空白处捕获
  });

  return g;
}

function rebuildSprites() {
  nodeLayer.removeChildren(); spriteById.clear();
  for (const t of yThoughts.values()) {
    const s = makeNodeSprite(t);
    spriteById.set(t.id, s);
    nodeLayer.addChild(s);
  }
  redrawEdges();
}

function redrawEdges() {
  edgeLayer.removeChildren();
  for (const e of yEdges.values()) {
    const a = spriteById.get(e.fromId); const b = spriteById.get(e.toId);
    if (!a || !b) continue;
    const line = new PIXI.Graphics();
    line.lineStyle(1, 0x7fe0c9, 0.4);
    line.moveTo(a.position.x, a.position.y);
    line.bezierCurveTo(
      a.position.x, a.position.y,
      b.position.x, b.position.y,
      b.position.x, b.position.y
    );
    edgeLayer.addChild(line);
  }
}

// ---------- 5. 交互:点击空白处新建念头 ----------
let shiftSelecting = null;
app.stage.on('pointerdown', e => {
  if (e.target !== app.stage) return;
  const local = world.toLocal(new PIXI.Point(e.global.x, e.global.y));
  if (e.shiftKey) {
    // 选择一个节点作为连接起点
    const nearest = findNearestNode(local.x, local.y, 60);
    if (nearest) {
      if (!shiftSelecting) {
        shiftSelecting = nearest;
        showToast('已选中起点,再次 Shift+点击另一个念头建立连接');
      } else if (shiftSelecting !== nearest) {
        const edgeId = `e_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
        yEdges.set(edgeId, { id: edgeId, fromId: shiftSelecting, toId: nearest, relationType: 'parallel' });
        shiftSelecting = null;
      }
    }
    return;
  }
  // 普通点击:新建念头
  const id = `t_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
  const text = ['一个念头', '模糊的感受', '想试试看', '这是什么?', '呼...'][Math.floor(Math.random() * 5)];
  yThoughts.set(id, {
    id, text,
    x: local.x, y: local.y,
    mass: 1, temperature: 1,
    colorTag: null, createdAt: Date.now()
  });
});

function findNearestNode(x, y, maxDist) {
  let best = null; let bestD = maxDist;
  for (const t of yThoughts.values()) {
    const dx = (t.x ?? 0) - x; const dy = (t.y ?? 0) - y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < bestD) { bestD = d; best = t.id; }
  }
  return best;
}

// ---------- 6. Yjs -> 渲染同步 ----------
let rebuildTimer = null;
yThoughts.observeDeep(() => {
  rebuildSimFromYjs();
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(rebuildSprites, 80);
});
yEdges.observeDeep(() => {
  rebuildSimFromYjs();
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(rebuildSprites, 80);
});

// ---------- 7. 初始数据(若空) ----------
if (yThoughts.size === 0) {
  seedSample();
}

function seedSample() {
  const seed = [
    { text: '想开始一个新项目', x: -180, y: -80 },
    { text: '但不知道从哪开始', x: 80, y: -120 },
    { text: '也许先做个原型', x: -40, y: 80 },
    { text: '验证手感', x: 200, y: 60 },
    { text: '克制的游戏化', x: -260, y: 120 },
    { text: '照料念头田野', x: 120, y: 200 },
  ];
  const ids = seed.map((s, i) => `t_seed_${i}`);
  ids.forEach((id, i) => {
    yThoughts.set(id, { id, text: seed[i].text, x: seed[i].x, y: seed[i].y, mass: 1 + Math.random(), temperature: 0.6 + Math.random() * 0.4, colorTag: null, createdAt: Date.now() });
  });
  yEdges.set('e_seed_0', { id: 'e_seed_0', fromId: ids[0], toId: ids[1], relationType: 'sequence' });
  yEdges.set('e_seed_1', { id: 'e_seed_1', fromId: ids[1], toId: ids[2], relationType: 'cause' });
  yEdges.set('e_seed_2', { id: 'e_seed_2', fromId: ids[2], toId: ids[3], relationType: 'parallel' });
  yEdges.set('e_seed_3', { id: 'e_seed_3', fromId: ids[5], toId: ids[0], relationType: 'cause' });
}

// ---------- 8. 工具栏 ----------
document.getElementById('btn-add').onclick = () => {
  const local = { x: (Math.random() - 0.5) * 600, y: (Math.random() - 0.5) * 400 };
  const id = `t_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
  const text = prompt('写一句念头:') || '新念头';
  yThoughts.set(id, { id, text, x: local.x, y: local.y, mass: 1, temperature: 1, colorTag: null, createdAt: Date.now() });
};
document.getElementById('btn-reset').onclick = () => {
  rebuildSimFromYjs();
  sim.alpha(1).restart();
};
document.getElementById('btn-sample').onclick = () => {
  if (yThoughts.size > 0) { showToast('已有数据,先清空再载入示例'); return; }
  seedSample();
};
document.getElementById('btn-clear').onclick = () => {
  if (!confirm('确认清空所有念头与连接?')) return;
  ydoc.transact(() => { yThoughts.clear(); yEdges.clear(); });
};

// ---------- 9. FPS 与提示 ----------
let fpsAcc = 0, fpsFrames = 0;
app.ticker.add(() => {
  redrawEdges(); // 边缘跟随节点
  fpsFrames++;
});
setInterval(() => {
  document.getElementById('stat-fps').textContent = fpsFrames;
  document.getElementById('stat-thoughts').textContent = yThoughts.size;
  document.getElementById('stat-edges').textContent = yEdges.size;
  fpsFrames = 0;
}, 1000);

const hint = document.getElementById('hint');
setTimeout(() => hint.classList.add('fade'), 8000);

const toastEl = document.getElementById('toast');
let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1500);
}

// 启动
rebuildSimFromYjs();
rebuildSprites();
sim.alpha(0.6).restart();

// 启动时若是从 IndexedDB 恢复数据,提示用户
persistence.once('synced', () => {
  if (yThoughts.size > 0) showToast(`从本地恢复 ${yThoughts.size} 个念头 ✓`);
});
</script>
</body>
</html>
