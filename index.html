<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>念头空间 · 拓扑意识空间</title>
<style>
  :root { --bg-deep: #080a14; --crystal: #7fe0c9; --amber: #e8a865; --rose: #e87aa8; --ink: #e9e7f4; --ink-dim: #8b90ad; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-deep); color: var(--ink); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
  #stage { position: fixed; inset: 0; }
  .top-bar { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 12px; }
  .top-bar span { font-size: 12px; color: var(--ink-dim); letter-spacing: 2px; }
  .top-bar b { color: var(--crystal); font-weight: 500; }
  .hint-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 11px; color: var(--ink-dim); letter-spacing: 2px; pointer-events: none; text-align: center; transition: opacity 0.6s; }
  .hint-bar.fade { opacity: 0; }
</style>
</head>
<body>
  <div id="stage"></div>
  <div class="top-bar">
    <span>念头 <b id="stat-nodes">0</b></span>
    <span>连接 <b id="stat-edges">0</b></span>
    <span>面 <b id="stat-face">正面</b></span>
  </div>
  <div class="hint-bar" id="hint">
    滑动切换意识面 · 点击投念头 · 双击捞起 · Ctrl+Z 撤销
  </div>
  <script type="importmap">
    { "imports": { "three": "./node_modules/three/build/three.module.js", "d3-force-3d": "./node_modules/d3-force-3d/dist/d3-force-3d.es.js", "convex-hull": "./node_modules/convex-hull/lib/ch.js" } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
